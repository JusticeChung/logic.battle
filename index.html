<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>知識拔河：多行題目修復版</title>
    <style>
        :root { --team-a-col: #3498db; --team-b-col: #e74c3c; }
        body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: #f0f3f5; margin: 0; overflow: hidden; touch-action: manipulation; }
        
        #header { height: 110px; background: white; box-shadow: 0 2px 15px rgba(0,0,0,0.1); position: relative; z-index: 50; padding-top: 20px; }
        #track-container { width: 85%; margin: 0 auto; position: relative; height: 60px; display: flex; align-items: center; }
        #track { width: 100%; height: 20px; background: #ddd; border-radius: 10px; border: 1px solid #bbb; position: relative; display: flex; align-items: center; }
        #rope { 
            width: 50px; height: 50px; background: #f1c40f; border: 4px solid #333; border-radius: 50%; 
            position: absolute; left: calc(50% - 25px); transition: left 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
            display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 22px; z-index: 60; 
        }
        .team-name-label { position: absolute; top: -25px; font-weight: 900; font-size: 20px; }

        /* 題目區：確保高度自動適應多行文字 */
        #q-box { 
            position: relative; margin: 15px auto; width: 88%; max-width: 800px; 
            background: white; padding: 20px; border-radius: 20px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.15); border: 3px solid #333; z-index: 40;
            min-height: 80px;
        }
        #q-text { 
            font-size: 22px; font-weight: bold; line-height: 1.6; text-align: left; 
            white-space: pre-wrap; word-wrap: break-word; color: #2c3e50; 
        }

        #main-game { display: flex; height: calc(100vh - 320px); min-height: 300px; }
        .team-side { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #side-a { background: #ebf5ff; border-right: 2px dashed #adcce9; }
        #side-b { background: #fff5f5; }
        .options-grid { width: 92%; max-width: 320px; display: grid; gap: 12px; }
        .opt-btn { padding: 15px 8px; font-size: 20px; font-weight: bold; border-radius: 12px; border: 3px solid #ddd; background: white; cursor: pointer; box-shadow: 0 5px 0 #ddd; }
        
        .nav-btns { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 500; }
        .nav-btn { padding: 10px 18px; border-radius: 25px; border: none; color: white; font-weight: bold; font-size: 14px; cursor: pointer; }

        #settings-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; padding: 20px; box-sizing: border-box; }
        .bulk-textarea { width: 100%; height: 70%; margin: 10px 0; padding: 10px; font-size: 16px; border: 2px solid #3498db; border-radius: 10px; }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        #modal-content { background: white; width: 88%; max-width: 500px; padding: 25px; border-radius: 25px; text-align: center; border: 5px solid #333; }
        #m-explanation { background: #f9f9f9; padding: 15px; border-radius: 15px; margin-top: 15px; text-align: left; font-size: 17px; color: #555; border-left: 5px solid #f1c40f; display: none; }
    </style>
</head>
<body>

    <div class="nav-btns">
        <button class="nav-btn" style="background: #333;" onclick="toggleSet(true)">⚙️ 批量匯入</button>
        <button class="nav-btn" style="background: #f39c12;" onclick="location.reload()">🔄 重新開始</button>
    </div>

    <div id="header">
        <div id="track-container">
            <div class="team-name-label" id="label-a" style="left:0; color:var(--team-a-col)">藍隊</div>
            <div class="team-name-label" id="label-b" style="right:0; color:var(--team-b-col)">紅隊</div>
            <div id="track"><div id="rope">0</div></div>
        </div>
    </div>

    <div id="q-box">
        <div id="q-count" style="font-size:13px; color: #888; text-align: center; margin-bottom: 5px;">剩餘題目: 0</div>
        <div id="q-text">載入中...</div>
    </div>

    <div id="main-game">
        <div class="team-side" id="side-a"><div class="options-grid" id="opts-a"></div></div>
        <div class="team-side" id="side-b"><div class="options-grid" id="opts-b"></div></div>
    </div>

    <div id="settings-panel">
        <h2>🚀 批量匯入 (支援多行題目)</h2>
        <p style="font-size: 13px;">格式：題目 | 選項1,選項2... | 答案序號 | 解析內容</p>
        <textarea id="bulk-input" class="bulk-textarea" placeholder="在這裡貼上題目..."></textarea>
        <button onclick="bulkImport()" style="background:#3498db; color:white; border:none; padding:15px; border-radius:10px; width:100%; font-weight:bold; font-size: 18px;">儲存並套用</button>
        <button onclick="toggleSet(false)" style="width:100%; padding:15px; color:#999; border:none; background:none;">取消返回</button>
    </div>

    <div id="modal">
        <div id="modal-content">
            <h2 id="m-title" style="font-size:28px; margin: 0 0 10px 0;"></h2>
            <div id="m-body" style="font-size: 20px; font-weight: bold;"></div>
            <div id="m-explanation"></div>
            <button id="m-btn" onclick="closeM()" style="width:100%; padding:15px; background:#333; color:white; border:none; border-radius:12px; font-size:20px; margin-top: 15px;">繼續</button>
        </div>
    </div>

    <script>
        let gameData = { win: 5, nameA: "藍隊", nameB: "紅隊", questions: [] };
        let score = 0, pool = [], current = null, locked = false;

        function toggleSet(show) { document.getElementById('settings-panel').style.display = show ? 'block' : 'none'; }

        function bulkImport() {
            const rawText = document.getElementById('bulk-input').value.trim();
            if (!rawText) return;

            // 核心修正：使用正則表達式來分割題目。
            // 邏輯：只有當下一行符合「內容 | 內容 | 數字」的格式時，才視為新題目。
            // 這樣题目內部的換行就不會被切斷。
            const questionSeparator = /\n(?=[^|]+\|[^|]+\|\d+)/g;
            const segments = rawText.split(questionSeparator);
            
            const newQs = [];
            segments.forEach(seg => {
                const parts = seg.split('|');
                if (parts.length >= 3) {
                    newQs.push({ 
                        q: parts[0].trim(), 
                        o: parts[1].split(',').map(s => s.trim()), 
                        a: parseInt(parts[2].trim()) || 0,
                        d: parts[3] ? parts[3].trim() : "（無解析內容）"
                    });
                }
            });

            if (newQs.length > 0) {
                gameData.questions = newQs;
                localStorage.setItem('tug_v15_fixed', JSON.stringify(gameData));
                location.reload();
            }
        }

        function updateRope() {
            const rope = document.getElementById('rope');
            const offset = 50 - (score * (50 / gameData.win));
            rope.style.left = `calc(${Math.max(0, Math.min(100, offset))}% - 25px)`;
            rope.innerText = Math.abs(score);
        }

        function init() {
            const saved = localStorage.getItem('tug_v15_fixed');
            if (saved) gameData = JSON.parse(saved);
            if (gameData.questions.length > 0) {
                pool = [...gameData.questions].sort(() => Math.random() - 0.5);
                updateRope();
                next();
            }
        }

        function next() {
            if (pool.length === 0 && current !== null) {
                showFinalWinner();
                return;
            }
            locked = false;
            current = pool.pop();
            document.getElementById('q-count').innerText = `剩餘題目: ${pool.length}`;
            document.getElementById('q-text').innerText = current.q;
            ['a', 'b'].forEach(t => {
                const box = document.getElementById('opts-'+t); box.innerHTML = '';
                current.o.forEach((txt, i) => {
                    const b = document.createElement('button'); b.className = 'opt-btn'; b.innerText = txt;
                    b.onclick = () => { if(!locked) { locked=true; check(i, t); }};
                    box.appendChild(b);
                });
            });
        }

        function check(idx, team) {
            const win = (idx === current.a);
            if(team === 'a') score += (win ? 1 : -1);
            else score += (win ? -1 : 1);
            updateRope();
            
            if(Math.abs(score) >= gameData.win) showFinalWinner();
            else showResultModal(win);
        }

        function showResultModal(win) {
            const btn = document.getElementById('m-btn');
            document.getElementById('m-title').innerText = win ? "✅ 正確！" : "❌ 答錯了";
            document.getElementById('m-title').style.color = win ? "#2ecc71" : "#e74c3c";
            document.getElementById('m-body').innerText = `正確答案：${current.o[current.a]}`;
            const exp = document.getElementById('m-explanation');
            exp.style.display = "block";
            exp.innerHTML = `<b>💡 解析：</b><br>${current.d}`;
            btn.innerText = "繼續下一題";
            btn.onclick = closeM;
            document.getElementById('modal').style.display = "flex";
        }

        function showFinalWinner() {
            const btn = document.getElementById('m-btn');
            const winner = score > 0 ? gameData.nameA : (score < 0 ? gameData.nameB : "雙方");
            document.getElementById('m-title').innerText = "🏆 遊戲結束";
            document.getElementById('m-title').style.color = "#f1c40f";
            document.getElementById('m-body').innerText = `${winner} 獲勝！`;
            document.getElementById('m-explanation').style.display = "none";
            btn.innerText = "重新開始遊戲";
            btn.onclick = () => location.reload();
            document.getElementById('modal').style.display = "flex";
        }

        function closeM() { document.getElementById('modal').style.display = 'none'; next(); }
        window.onload = init;
    </script>
</body>
</html>
