<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>知識拔河：對戰版</title>
    <style>
        :root { --team-a-col: #3498db; --team-b-col: #e74c3c; }
        body { font-family: -apple-system, sans-serif; background: #f0f3f5; margin: 0; overflow: hidden; touch-action: manipulation; }
        #header { height: 130px; background: white; box-shadow: 0 2px 15px rgba(0,0,0,0.1); position: relative; z-index: 50; }
        #track-container { width: 80%; margin: 0 auto; position: relative; top: 50px; }
        #track { width: 100%; height: 12px; background: #ddd; border-radius: 6px; }
        #rope { width: 44px; height: 44px; background: #f1c40f; border: 3px solid #333; border-radius: 50%; position: absolute; top: -16px; left: calc(50% - 22px); transition: left 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .team-name-label { position: absolute; top: -35px; font-weight: bold; font-size: 16px; }
        #main-game { display: flex; height: calc(100vh - 130px); }
        .team-side { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #side-a { background: #ebf5ff; border-right: 1px solid #ddd; }
        #side-b { background: #fff5f5; }
        #q-box { position: absolute; top: 145px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 600px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); text-align: center; z-index: 100; border: 2px solid #333; }
        .options-grid { width: 100%; max-width: 280px; display: grid; gap: 12px; margin-top: 80px; }
        .opt-btn { padding: 20px 10px; font-size: 18px; border-radius: 12px; border: 2px solid #ccc; background: white; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        #settings-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; padding: 20px; overflow-y: auto; box-sizing: border-box; }
        textarea { width: 100%; height: 200px; margin: 10px 0; font-size: 14px; padding: 10px; box-sizing: border-box; }
        input { padding: 12px; margin: 5px 0; width: 80%; border: 1px solid #ccc; border-radius: 8px; }
        .config-btn { position: absolute; top: 5px; right: 5px; background: #333; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-size: 14px; z-index: 200; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center; color: white; }
    </style>
</head>
<body>
    <button class="config-btn" onclick="toggleSet(true)">⚙️ 設定</button>
    <div id="header">
        <div id="track-container">
            <div class="team-name-label" id="label-a" style="left:0; color:var(--team-a-col)">藍隊</div>
            <div class="team-name-label" id="label-b" style="right:0; color:var(--team-b-col)">紅隊</div>
            <div id="track"><div id="rope">0</div></div>
        </div>
    </div>
    <div id="q-box"><p id="q-text" style="font-size:22px; font-weight:bold; margin:0;">載入中...</p></div>
    <div id="main-game">
        <div class="team-side" id="side-a"><div class="options-grid" id="opts-a"></div></div>
        <div class="team-side" id="side-b"><div class="options-grid" id="opts-b"></div></div>
    </div>

    <div id="settings-panel">
        <h2 style="margin-top:40px;">⚙️ 遊戲設定</h2>
        <div style="margin-bottom:20px;">
            藍隊名稱：<br><input type="text" id="set-name-a" value="藍隊"><br>
            紅隊名稱：<br><input type="text" id="set-name-b" value="紅隊">
        </div>
        <div>
            獲勝分數：<br><input type="number" id="set-win" value="10">
        </div>
        <p>題目清單 (格式：題目|選項1,2,3,4|正確答案索引0-3|解析)</p>
        <textarea id="set-questions">範例題目：地球上最大的動物？|大象,藍鯨,長頸鹿,河馬|1|藍鯨是體型最大的動物。
範例題目：水在幾度結冰？|100度,10度,0度,-10度|2|標準大氣壓下是0度。</textarea>
        <button onclick="saveSet()" style="background:#2ecc71; color:white; padding:15px; border:none; border-radius:10px; font-size:18px; width:100%; margin-top:10px;">儲存並重新開始</button>
        <button onclick="toggleSet(false)" style="margin-top:10px; background:#95a5a6; color:white; padding:10px; border:none; border-radius:10px; width:100%;">取消</button>
    </div>

    <div id="modal">
        <div style="background:white; color:#333; width:80%; max-width:400px; padding:30px; border-radius:20px; text-align:center;">
            <h2 id="m-title"></h2>
            <p id="m-desc"></p>
            <button onclick="closeM()" style="width:100%; padding:15px; background:#333; color:white; border:none; border-radius:10px; font-size:18px;">下一題</button>
        </div>
    </div>

    <script>
        let gameData = {
            win: 10, nameA: "藍隊", nameB: "紅隊",
            questions: [
                { q: "地球上最大的動物？", o: ["大象", "藍鯨", "長頸鹿", "河馬"], a: 1, d: "藍鯨是體型最大的動物。" },
                { q: "水在幾度結冰？", o: ["100度", "10度", "0度", "-10度"], a: 2, d: "標準大氣壓下是0度。" }
            ]
        };
        let score = 0, avail = [], current = null, locked = false;

        function toggleSet(show) { document.getElementById('settings-panel').style.display = show ? 'block' : 'none'; }

        function saveSet() {
            gameData.nameA = document.getElementById('set-name-a').value;
            gameData.nameB = document.getElementById('set-name-b').value;
            gameData.win = parseInt(document.getElementById('set-win').value) || 10;
            const lines = document.getElementById('set-questions').value.trim().split('\n');
            gameData.questions = lines.map(line => {
                const parts = line.split('|');
                if(parts.length < 3) return null;
                return { q: parts[0], o: parts[1].split(','), a: parseInt(parts[2]), d: parts[3] || "" };
            }).filter(q => q !== null);
            localStorage.setItem('tug_game_data_v2', JSON.stringify(gameData));
            location.reload();
        }

        function init() {
            const saved = localStorage.getItem('tug_game_data_v2');
            if (saved) gameData = JSON.parse(saved);
            
            document.getElementById('label-a').innerText = gameData.nameA;
            document.getElementById('label-b').innerText = gameData.nameB;
            document.getElementById('set-name-a').value = gameData.nameA;
            document.getElementById('set-name-b').value = gameData.nameB;
            document.getElementById('set-win').value = gameData.win;
            let qStr = "";
            gameData.questions.forEach(q => { qStr += `${q.q}|${q.o.join(',')}|${q.a}|${q.d}\n`; });
            document.getElementById('set-questions').value = qStr.trim();

            avail = [...gameData.questions];
            next();
        }

        function next() {
            if (avail.length === 0) avail = [...gameData.questions];
            locked = false;
            current = avail.splice(Math.floor(Math.random()*avail.length), 1)[0];
            document.getElementById('q-text').innerText = current.q;
            ['a', 'b'].forEach(t => {
                const box = document.getElementById('opts-'+t); box.innerHTML = '';
                current.o.forEach((txt, i) => {
                    const b = document.createElement('button'); b.className = 'opt-btn'; b.innerText = txt;
                    b.onclick = () => { if(!locked) { locked=true; const win=(i===current.a); score+=(t==='a'?(win?1:-1):(win?-1:1)); showM(win); }};
                    box.appendChild(b);
                });
            });
        }

        function showM(win) {
            document.getElementById('m-title').innerText = win ? "✅ 正確" : "❌ 錯誤";
            document.getElementById('m-desc').innerHTML = `<b>答案：${current.o[current.a]}</b><br>${current.d}`;
            document.getElementById('modal').style.display = 'flex';
            const offset = 50 - (score * (50/gameData.win));
            document.getElementById('rope').style.left = `calc(${offset}% - 22px)`;
            document.getElementById('rope').innerText = Math.abs(score);
        }

        function closeM() { 
            document.getElementById('modal').style.display = 'none'; 
            if(Math.abs(score)>=gameData.win) { 
                alert((score>0?gameData.nameA:gameData.nameB)+"獲勝！"); 
                score=0; location.reload(); 
            } else next();
        }
        init();
    </script>
</body>
</html>
