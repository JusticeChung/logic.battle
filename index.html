<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>知識拔河：精準識別版</title>
    <style>
        :root { --team-a-col: #3498db; --team-b-col: #e74c3c; }
        body { font-family: -apple-system, sans-serif; background: #f0f3f5; margin: 0; overflow: hidden; }
        #header { height: 110px; background: white; box-shadow: 0 2px 15px rgba(0,0,0,0.1); padding-top: 20px; z-index: 50; position: relative; }
        #track-container { width: 85%; margin: 0 auto; position: relative; height: 60px; display: flex; align-items: center; }
        #track { width: 100%; height: 20px; background: #ddd; border-radius: 10px; position: relative; }
        #rope { 
            width: 50px; height: 50px; background: #f1c40f; border: 4px solid #333; border-radius: 50%; 
            position: absolute; left: calc(50% - 25px); transition: left 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
            display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 20px;
        }
        .team-label { position: absolute; top: -25px; font-weight: 900; font-size: 18px; }
        #q-box { position: relative; margin: 15px auto; width: 88%; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); border: 3px solid #333; }
        #q-text { font-size: 22px; font-weight: bold; line-height: 1.6; white-space: pre-wrap; color: #2c3e50; }
        #main-game { display: flex; height: calc(100vh - 320px); }
        .team-side { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #side-a { background: #ebf5ff; border-right: 2px dashed #ccc; }
        #side-b { background: #fff5f5; }
        .options-grid { width: 90%; display: grid; gap: 10px; }
        .opt-btn { padding: 15px; font-size: 18px; font-weight: bold; border-radius: 12px; border: 3px solid #ddd; background: white; cursor: pointer; }
        .nav-btns { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 500; }
        .nav-btn { padding: 10px 15px; border-radius: 20px; border: none; color: white; font-weight: bold; cursor: pointer; }
        #settings-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .bulk-textarea { width: 100%; height: 50%; margin: 10px 0; padding: 10px; border: 2px solid #3498db; font-size: 14px; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        #modal-content { background: white; width: 85%; padding: 25px; border-radius: 25px; text-align: center; border: 5px solid #333; }
        #m-explanation { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-top: 15px; text-align: left; border-left: 5px solid #f1c40f; display: none; }
    </style>
</head>
<body>

    <div class="nav-btns">
        <button class="nav-btn" style="background: #333;" onclick="toggleSet(true)">⚙️ 批量匯入</button>
        <button class="nav-btn" style="background: #f39c12;" onclick="location.reload()">🔄 重新開始</button>
    </div>

    <div id="header">
        <div id="track-container">
            <div class="team-label" style="left:0; color:var(--team-a-col)">藍隊</div>
            <div class="team-label" style="right:0; color:var(--team-b-col)">紅隊</div>
            <div id="track"><div id="rope">0</div></div>
        </div>
    </div>

    <div id="q-box">
        <div id="q-count" style="text-align:center; color:#888; font-size:12px; margin-bottom:5px;"></div>
        <div id="q-text">請點擊下方「批量匯入」按鈕添加題目。</div>
    </div>

    <div id="main-game">
        <div class="team-side" id="side-a"><div class="options-grid" id="opts-a"></div></div>
        <div class="team-side" id="side-b"><div class="options-grid" id="opts-b"></div></div>
    </div>

    <div id="settings-panel">
        <h2>🚀 批量匯入 (每一題用 *** 隔開)</h2>
        <p style="font-size: 14px; color: #666;">
            格式：題目 | 選項(用逗號隔開) | 答案序號 | 解析內容<br>
            <b>重要：題目與題目之間請務必加上 *** 符號作為分隔。</b>
        </p>
        <textarea id="bulk-input" class="bulk-textarea" placeholder="題目... | 選項... | 0 | 解析...
***
題目... | 選項... | 1 | 解析..."></textarea>
        <button onclick="bulkImport()" style="background:#3498db; color:white; width:100%; padding:15px; border:none; border-radius:10px; font-weight:bold; font-size: 18px;">儲存並開始</button>
        <button onclick="toggleSet(false)" style="width:100%; background:none; border:none; color:#999; margin-top:10px;">取消返回</button>
    </div>

    <div id="modal">
        <div id="modal-content">
            <h2 id="m-title"></h2>
            <div id="m-body" style="font-size: 20px;"></div>
            <div id="m-explanation"></div>
            <button id="m-btn" onclick="closeM()" style="width:100%; padding:15px; background:#333; color:white; border:none; border-radius:10px; margin-top:15px; font-size:18px;">繼續</button>
        </div>
    </div>

    <script>
        let gameData = { questions: [] };
        let score = 0, pool = [], current = null, locked = false;

        function toggleSet(show) { document.getElementById('settings-panel').style.display = show ? 'block' : 'none'; }

        function bulkImport() {
            const rawText = document.getElementById('bulk-input').value.trim();
            if (!rawText) return;

            // 改用明確的 *** 作為分隔符
            const rawQuestions = rawText.split('***');
            const newQs = [];

            rawQuestions.forEach(qStr => {
                const parts = qStr.split('|');
                if (parts.length >= 3) {
                    newQs.push({ 
                        q: parts[0].trim(), 
                        o: parts[1].split(',').map(s => s.trim()), 
                        a: parseInt(parts[2].trim()) || 0,
                        d: parts[3] ? parts[3].trim() : "（無解析）"
                    });
                }
            });

            if (newQs.length > 0) {
                gameData.questions = newQs;
                localStorage.setItem('tug_v17_final', JSON.stringify(gameData));
                location.reload();
            } else {
                alert("未偵測到有效題目，請確認是否使用了 | 分隔欄位。");
            }
        }

        function updateRope() {
            const rope = document.getElementById('rope');
            let percent = 50 - (score * 8); 
            percent = Math.max(5, Math.min(95, percent));
            rope.style.left = `calc(${percent}% - 25px)`;
            rope.innerText = Math.abs(score);
        }

        function init() {
            const saved = localStorage.getItem('tug_v17_final');
            if (saved) {
                gameData = JSON.parse(saved);
                pool = [...gameData.questions];
                updateRope();
                next();
            }
        }

        function next() {
            if (pool.length === 0) {
                if (current) showFinalWinner();
                return;
            }
            locked = false;
            current = pool.shift(); 
            document.getElementById('q-count').innerText = `剩餘題目: ${pool.length}`;
            document.getElementById('q-text').innerText = current.q;
            
            ['a', 'b'].forEach(t => {
                const box = document.getElementById('opts-'+t);
                box.innerHTML = '';
                current.o.forEach((txt, i) => {
                    const b = document.createElement('button');
                    b.className = 'opt-btn';
                    b.innerText = txt;
                    b.onclick = () => { if(!locked) { locked=true; check(i, t); }};
                    box.appendChild(b);
                });
            });
        }

        function check(idx, team) {
            const isCorrect = (idx === current.a);
            if(team === 'a') score += (isCorrect ? 1 : -1);
            else score += (isCorrect ? -1 : 1);
            updateRope();
            showResultModal(isCorrect);
        }

        function showResultModal(win) {
            document.getElementById('m-title').innerText = win ? "✅ 正確！" : "❌ 答錯了";
            document.getElementById('m-title').style.color = win ? "#2ecc71" : "#e74c3c";
            document.getElementById('m-body').innerText = `正確答案：${current.o[current.a]}`;
            const exp = document.getElementById('m-explanation');
            exp.style.display = "block";
            exp.innerHTML = `<b>💡 解析：</b><br>${current.d}`;
            document.getElementById('m-btn').innerText = "下一題";
            document.getElementById('m-btn').onclick = closeM;
            document.getElementById('modal').style.display = "flex";
        }

        function showFinalWinner() {
            const winner = score > 0 ? "藍隊" : (score < 0 ? "紅隊" : "平手");
            document.getElementById('m-title').innerText = "🏆 遊戲結束";
            document.getElementById('m-title').style.color = "#f1c40f";
            document.getElementById('m-body').innerText = `所有題目已完成！\n最終結果：${winner} 領先`;
            document.getElementById('m-explanation').style.display = "none";
            document.getElementById('m-btn').innerText = "重新開始";
            document.getElementById('m-btn').onclick = () => location.reload();
            document.getElementById('modal').style.display = "flex";
        }

        function closeM() { document.getElementById('modal').style.display = 'none'; next(); }
        window.onload = init;
    </script>
</body>
</html>
