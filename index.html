<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>知識拔河：對齊修復版</title>
    <style>
        :root { --team-a-col: #3498db; --team-b-col: #e74c3c; }
        body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: #f0f3f5; margin: 0; overflow: hidden; touch-action: manipulation; }
        
        #header { height: 110px; background: white; box-shadow: 0 2px 15px rgba(0,0,0,0.1); position: relative; z-index: 50; padding-top: 20px; }
        #track-container { width: 85%; margin: 0 auto; position: relative; height: 60px; display: flex; align-items: center; }
        #track { width: 100%; height: 20px; background: #ddd; border-radius: 10px; border: 1px solid #bbb; position: relative; display: flex; align-items: center; }
        
        #rope { 
            width: 50px; height: 50px; background: #f1c40f; border: 4px solid #333; border-radius: 50%; 
            position: absolute; left: calc(50% - 25px); transition: left 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
            display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 22px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 60; 
        }
        
        .team-name-label { position: absolute; top: -25px; font-weight: 900; font-size: 20px; }

        /* 核心修復：題目置左但保持框框置中，不擋住下方選項 */
        #q-box { 
            position: relative; /* 改回 relative 讓它佔據空間，不遮擋下方 */
            margin: 20px auto; 
            width: 85%; max-width: 700px; 
            background: white; padding: 20px; border-radius: 20px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.15); border: 3px solid #333;
            z-index: 40;
        }
        
        #q-text { 
            font-size: 24px; font-weight: bold; line-height: 1.4; 
            text-align: left; /* 這裡實現題目置左 */
            white-space: pre-wrap; /* 實現換行 */
            word-wrap: break-word;
            margin-top: 10px;
        }

        #main-game { display: flex; height: calc(100vh - 280px); } /* 調整高度確保不重疊 */
        .team-side { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #side-a { background: #ebf5ff; border-right: 3px dashed #adcce9; }
        #side-b { background: #fff5f5; }
        
        .options-grid { width: 90%; max-width: 300px; display: grid; gap: 15px; }
        .opt-btn { padding: 18px 10px; font-size: 22px; font-weight: bold; border-radius: 15px; border: 3px solid #ddd; background: white; cursor: pointer; box-shadow: 0 6px 0 #ddd; }
        
        .nav-btns { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 500; }
        .nav-btn { padding: 12px 20px; border-radius: 30px; border: none; color: white; font-weight: bold; font-size: 14px; cursor: pointer; }

        #settings-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; padding: 20px; overflow-y: auto; box-sizing: border-box; }
        .bulk-textarea { width: 100%; height: 200px; margin: 10px 0; padding: 10px; font-family: monospace; }
    </style>
</head>
<body>

    <div class="nav-btns">
        <button class="nav-btn" style="background: #333;" onclick="toggleSet(true)">⚙️ 批量匯入</button>
        <button class="nav-btn" style="background: #f39c12;" onclick="location.reload()">🔄 重開遊戲</button>
    </div>

    <div id="header">
        <div id="track-container">
            <div class="team-name-label" id="label-a" style="left:0; color:var(--team-a-col)">藍隊</div>
            <div class="team-name-label" id="label-b" style="right:0; color:var(--team-b-col)">紅隊</div>
            <div id="track"><div id="rope">0</div></div>
        </div>
    </div>

    <div id="q-box">
        <div id="q-count" style="font-size:14px; color: #888; text-align: center;">剩餘題目: 0</div>
        <div id="q-text">載入中...</div>
    </div>

    <div id="main-game">
        <div class="team-side" id="side-a"><div class="options-grid" id="opts-a"></div></div>
        <div class="team-side" id="side-b"><div class="options-grid" id="opts-b"></div></div>
    </div>

    <div id="settings-panel">
        <h2>🚀 批量匯入題目</h2>
        <p>格式：題目 | 選項1,選項2,選項3,選項4 | 答案序號(0-3)</p>
        <textarea id="bulk-input" class="bulk-textarea" placeholder="在此貼上清單..."></textarea>
        <button onclick="bulkImport()" style="background:#3498db; color:white; border:none; padding:15px; border-radius:10px; width:100%; font-weight:bold;">儲存並套用</button>
        <button onclick="toggleSet(false)" style="width:100%; padding:10px; border:none; background:none;">取消</button>
    </div>

    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center;">
        <div style="background:white; width:85%; max-width:450px; padding:30px; border-radius:30px; text-align:center;">
            <h2 id="m-title" style="font-size:32px;"></h2>
            <div id="m-body" style="font-size: 20px; margin: 20px 0;"></div>
            <button onclick="closeM()" style="width:100%; padding:18px; background:#333; color:white; border:none; border-radius:15px; font-size:22px;">繼續</button>
        </div>
    </div>

    <script>
        let gameData = { win: 5, nameA: "藍隊", nameB: "紅隊", questions: [{ q: "請匯入題目清單開始遊戲。", o: ["A", "B", "C", "D"], a: 0 }] };
        let score = 0, pool = [], current = null, locked = false;

        function toggleSet(show) { document.getElementById('settings-panel').style.display = show ? 'block' : 'none'; }

        function bulkImport() {
            const text = document.getElementById('bulk-input').value.trim();
            if (!text) return;
            const lines = text.split('\n');
            const newQs = [];
            lines.forEach(l => {
                const p = l.split('|');
                if (p.length >= 3) newQs.push({ q: p[0].trim(), o: p[1].split(',').map(s => s.trim()), a: parseInt(p[2].trim()) || 0 });
            });
            if (newQs.length > 0) {
                gameData.questions = newQs;
                localStorage.setItem('tug_v12', JSON.stringify(gameData));
                location.reload();
            }
        }

        function updateRope() {
            const rope = document.getElementById('rope');
            const offset = 50 - (score * (50 / gameData.win));
            rope.style.left = `calc(${Math.max(0, Math.min(100, offset))}% - 25px)`;
            rope.innerText = Math.abs(score);
        }

        function init() {
            const saved = localStorage.getItem('tug_v12');
            if (saved) gameData = JSON.parse(saved);
            pool = [...gameData.questions].sort(() => Math.random() - 0.5);
            updateRope();
            next();
        }

        function next() {
            if (pool.length === 0) {
                showFinalWinner((score > 0 ? gameData.nameA : (score < 0 ? gameData.nameB : "雙方")) + " 獲勝！");
                return;
            }
            locked = false;
            current = pool.pop();
            document.getElementById('q-count').innerText = `剩餘題目: ${pool.length}`;
            document.getElementById('q-text').innerText = current.q;
            ['a', 'b'].forEach(t => {
                const box = document.getElementById('opts-'+t); box.innerHTML = '';
                current.o.forEach((txt, i) => {
                    const b = document.createElement('button'); b.className = 'opt-btn'; b.innerText = txt;
                    b.onclick = () => { if(!locked) { locked=true; check(i, t); }};
                    box.appendChild(b);
                });
            });
        }

        function check(idx, team) {
            const win = (idx === current.a);
            if(team === 'a') score += (win ? 1 : -1);
            else score += (win ? -1 : 1);
            updateRope();
            if(Math.abs(score) >= gameData.win) showFinalWinner((score > 0 ? gameData.nameA : gameData.nameB) + " 獲勝！");
            else showResultModal(win);
        }

        function showResultModal(win) {
            document.getElementById('m-title').innerText = win ? "✅ 正確！" : "❌ 答錯了";
            document.getElementById('m-title').style.color = win ? "#2ecc71" : "#e74c3c";
            document.getElementById('m-body').innerText = `正確答案：${current.o[current.a]}`;
            document.getElementById('modal').style.display = "flex";
        }

        function showFinalWinner(msg) {
            document.getElementById('m-title').innerText = "遊戲結束！";
            document.getElementById('m-body').innerHTML = `<h2 style="color:#f1c40f;">🏆 ${msg}</h2>`;
            document.getElementById('modal').style.display = "flex";
        }

        function closeM() { document.getElementById('modal').style.display = 'none'; next(); }
        window.onload = init;
    </script>
</body>
</html>
